worker_processes  auto;
error_log         /dev/stderr warn;
pid               /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log    /dev/stdout;
    sendfile      on;
    keepalive_timeout 65;

    # Temp dirs that don't require root
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # Generous timeouts for long-running AI agent calls
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;
    proxy_connect_timeout  15s;

    upstream backend {
        server 127.0.0.1:8001;
    }

    server {
        listen      80;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        # ── API proxy → FastAPI / uvicorn ────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;

            # WebSocket support (streaming transcription / SSE)
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Disable buffering so SSE / streaming responses flow immediately
            proxy_buffering    off;
        }

        # ── React SPA — client-side routing fallback ─────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
